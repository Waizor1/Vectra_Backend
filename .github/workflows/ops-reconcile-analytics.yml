name: Ops Reconcile Service-Growth Analytics

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Reconcile window in days (1-30)"
        required: true
        default: "14"
        type: string
      send_alerts:
        description: "Send Telegram admin alerts for newly created risk flags"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  reconcile-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Run reconcile inside bloobcat container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          RECONCILE_DAYS: ${{ inputs.days }}
          RECONCILE_SEND_ALERTS: ${{ inputs.send_alerts }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
          set -euo pipefail
          if [ -z "$PROJECT_PATH" ]; then
            echo "PROJECT_PATH is empty"
            exit 1
          fi
          cd "$PROJECT_PATH"

          if [ -f docker-compose.prod.yml ]; then
            COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"
          else
            COMPOSE_ARGS="-f docker-compose.yml"
          fi

          DAYS_INT="\$(printf '%s' "$RECONCILE_DAYS" | tr -cd '0-9')"
          if [ -z "\$DAYS_INT" ] || [ "\$DAYS_INT" -lt 1 ] || [ "\$DAYS_INT" -gt 30 ]; then
            echo "Invalid days input: '$RECONCILE_DAYS' (must be 1-30)"
            exit 1
          fi

          ALERT_FLAG=""
          if [ "$RECONCILE_SEND_ALERTS" != "true" ]; then
            ALERT_FLAG="--no-alerts"
          fi

          echo "🔁 Reconciling service-growth analytics for last \$DAYS_INT day(s) (send_alerts=$RECONCILE_SEND_ALERTS)"
          docker compose \$COMPOSE_ARGS exec --interactive=false -T bloobcat \
            python scripts/reconcile_service_growth_analytics.py --days "\$DAYS_INT" \$ALERT_FLAG
          EOF
