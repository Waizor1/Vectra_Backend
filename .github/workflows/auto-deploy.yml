name: Auto Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: tvpn-backend-deploy-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Prepare test environment file
      run: cp .env.example .env

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        pip install -e . --no-deps

    - name: Debug Python import context
      run: |
        pwd
        ls -la
        python -c "import os,sys; print(os.getcwd()); print(sys.executable); print(sys.path); import bloobcat, pytest_asyncio; print(bloobcat.__file__); print(pytest_asyncio.__file__)"

    - name: Run backend tests
      run: python -m pytest tests -q

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
      run: |
        ssh $SERVER_USER@$SERVER_HOST << EOF
        set -e
        if [ -z "$PROJECT_PATH" ]; then
          echo "PROJECT_PATH is empty"
          exit 1
        fi
        cd "$PROJECT_PATH"
        echo "🚀 Выполняем деплой..."

        if [ -d .git ]; then
          # The VPS repo can have local hotfixes / untracked overrides.
          # If we don't stash them, `git pull --ff-only` can fail and block deploy.
          # We stash including untracked files to avoid merge overwrites (best-effort).
          ts="$(date +%F_%H%M%S)"
          git stash push -u -m "autodeploy-prepull $ts" || true
          git pull --ff-only
        else
          echo "⚠️  No .git directory in PROJECT_PATH; skipping git pull"
        fi

        if [ ! -f docker-compose.yml ]; then
          echo "docker-compose.yml not found in $PROJECT_PATH"
          exit 1
        fi

        # Prefer prod override when present (Caddy/TLS, etc.)
        if [ -f docker-compose.prod.yml ]; then
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          # Directus doesn't always reload app extensions on volume changes.
          # Restart ensures new /directus/extensions/* dist bundles are picked up.
          docker compose -f docker-compose.yml -f docker-compose.prod.yml restart directus || true
          COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"
        else
          docker compose -f docker-compose.yml up -d --build
          docker compose -f docker-compose.yml restart directus || true
          COMPOSE_ARGS="-f docker-compose.yml"
        fi

        echo "🩺 Ждем готовности Directus..."
        echo "🩺 Waiting for bloobcat health..."
        BLOOBCAT_READY=0
        for i in {1..90}; do
          if command -v curl >/dev/null; then
            if curl -sf "http://localhost:33083/health" >/dev/null; then
              BLOOBCAT_READY=1
              break
            fi
          else
            if wget -qO- "http://localhost:33083/health" >/dev/null; then
              BLOOBCAT_READY=1
              break
            fi
          fi
          sleep 2
        done

        if [ "\$BLOOBCAT_READY" -ne 1 ]; then
          echo "❌ bloobcat did not become healthy in time"
          docker compose \$COMPOSE_ARGS ps
          docker compose \$COMPOSE_ARGS logs --tail=200 bloobcat || true
          exit 1
        fi

        DIRECTUS_READY=0
        for i in {1..60}; do
          if command -v curl >/dev/null; then
            if curl -sf "http://localhost:8055/server/health" >/dev/null; then
              DIRECTUS_READY=1
              break
            fi
          else
            if wget -qO- "http://localhost:8055/server/health" >/dev/null; then
              DIRECTUS_READY=1
              break
            fi
          fi
          sleep 2
        done

        if [ "\$DIRECTUS_READY" -ne 1 ]; then
          echo "❌ Directus не стал healthy за отведенное время"
          docker compose \$COMPOSE_ARGS ps
          docker compose \$COMPOSE_ARGS logs --tail=120 directus || true
          exit 1
        fi

        echo "🛠️  Применяем Directus super-setup (UI/UX метаданные, права, presets)..."
        # Run inside the app container where Python deps exist, and point DIRECTUS_URL to the internal service.
        # Setup can fail transiently right after restart; retry to reduce flaky deploys.
        echo "Fixing FK active_tariffs.user_id -> users.id (ON DELETE CASCADE)..."
        FK_FIX_OK=0
        HAS_DB_SERVICE=0
        if docker compose \$COMPOSE_ARGS config --services | grep -qx "bloobcat_db"; then
          HAS_DB_SERVICE=1
        fi

        if [ "\$HAS_DB_SERVICE" -eq 1 ]; then
          docker compose \$COMPOSE_ARGS exec -T bloobcat_db sh -lc '
            psql -U postgres -d postgres -v ON_ERROR_STOP=1 <<'"'"'SQL'"'"'
            DO $$
            DECLARE
              s RECORD;
              c RECORD;
            BEGIN
              FOR s IN
                SELECT n.nspname AS schema_name
                FROM pg_namespace n
                WHERE n.nspname NOT IN ('pg_catalog', 'information_schema')
                  AND EXISTS (
                    SELECT 1
                    FROM pg_class c
                    WHERE c.relnamespace = n.oid
                      AND c.relname = 'active_tariffs'
                      AND c.relkind IN ('r', 'p')
                  )
                  AND EXISTS (
                    SELECT 1
                    FROM pg_class c
                    WHERE c.relnamespace = n.oid
                      AND c.relname = 'users'
                      AND c.relkind IN ('r', 'p')
                  )
              LOOP
                FOR c IN
                  SELECT tc.constraint_name
                  FROM information_schema.table_constraints tc
                  JOIN information_schema.key_column_usage kcu
                    ON tc.constraint_name = kcu.constraint_name
                   AND tc.constraint_schema = kcu.constraint_schema
                  JOIN information_schema.constraint_column_usage ccu
                    ON tc.constraint_name = ccu.constraint_name
                   AND tc.constraint_schema = ccu.constraint_schema
                  WHERE tc.constraint_type = 'FOREIGN KEY'
                    AND tc.table_schema = s.schema_name
                    AND tc.table_name = 'active_tariffs'
                    AND kcu.column_name = 'user_id'
                    AND ccu.table_name = 'users'
                    AND ccu.column_name = 'id'
                LOOP
                  EXECUTE format(
                    'ALTER TABLE %I.%I DROP CONSTRAINT IF EXISTS %I',
                    s.schema_name,
                    'active_tariffs',
                    c.constraint_name
                  );
                END LOOP;

                EXECUTE format(
                  'ALTER TABLE %I.%I ADD CONSTRAINT %I FOREIGN KEY (%I) REFERENCES %I.%I (%I) ON DELETE CASCADE',
                  s.schema_name,
                  'active_tariffs',
                  'fk_active_tariffs_user',
                  'user_id',
                  s.schema_name,
                  'users',
                  'id'
                );
              END LOOP;
            END $$;

            SELECT
              tc.table_schema,
              tc.constraint_name,
              rc.delete_rule
            FROM information_schema.table_constraints tc
            JOIN information_schema.key_column_usage kcu
              ON tc.constraint_name = kcu.constraint_name
             AND tc.constraint_schema = kcu.constraint_schema
            JOIN information_schema.constraint_column_usage ccu
              ON tc.constraint_name = ccu.constraint_name
             AND tc.constraint_schema = ccu.constraint_schema
            JOIN information_schema.referential_constraints rc
              ON tc.constraint_name = rc.constraint_name
             AND tc.constraint_schema = rc.constraint_schema
            WHERE tc.constraint_type = 'FOREIGN KEY'
              AND tc.table_name = 'active_tariffs'
              AND kcu.column_name = 'user_id'
              AND ccu.table_name = 'users'
              AND ccu.column_name = 'id'
            ORDER BY tc.table_schema, tc.constraint_name;
SQL
          ' && FK_FIX_OK=1 || true
        else
          echo "Warning: service bloobcat_db not found in compose config; skipping FK DB fix"
          FK_FIX_OK=1
        fi

        if [ "\$FK_FIX_OK" -ne 1 ]; then
          echo "FK DB fix failed; abort deploy"
          docker compose \$COMPOSE_ARGS ps
          docker compose \$COMPOSE_ARGS logs --tail=150 bloobcat_db || true
          exit 1
        fi

        SUPER_SETUP_OK=0
        docker compose \$COMPOSE_ARGS exec -T bloobcat sh -lc '
          export DIRECTUS_URL="http://directus:8055"
          attempt=1
          max_attempts=4
          while [ "\$attempt" -le "\$max_attempts" ]; do
            echo "Directus super-setup attempt \$attempt/\$max_attempts"
            if (python scripts/directus_super_setup.py || python3 scripts/directus_super_setup.py); then
              exit 0
            fi
            rc=\$?
            echo "⚠️  super-setup attempt failed (exit=\$rc)"
            if [ "\$rc" -eq 137 ]; then
              echo "⚠️  super-setup terminated with 137 (likely OOM/SIGKILL)"
            fi
            if [ "\$attempt" -lt "\$max_attempts" ]; then
              echo "⚠️  retry in 10s..."
              sleep 10
            fi
            attempt=\$((attempt + 1))
          done
          exit 1
        ' && SUPER_SETUP_OK=1 || true

        if [ "\$SUPER_SETUP_OK" -ne 1 ]; then
          echo "⚠️  Directus super-setup failed after retries; continue deploy without blocking release"
          docker compose \$COMPOSE_ARGS ps
          docker compose \$COMPOSE_ARGS logs --tail=150 bloobcat || true
          docker compose \$COMPOSE_ARGS logs --tail=150 directus || true
        fi

        echo "📦 Применяем тарифы (idempotent seed)..."
        TARIFFS_SEED_OK=0
        docker compose \$COMPOSE_ARGS exec -T bloobcat sh -lc '
          attempt=1
          max_attempts=3
          while [ "\$attempt" -le "\$max_attempts" ]; do
            echo "Tariffs seed attempt \$attempt/\$max_attempts"
            if (python scripts/seed_tariffs.py || python3 scripts/seed_tariffs.py); then
              exit 0
            fi
            rc=\$?
            echo "⚠️  tariffs seed attempt failed (exit=\$rc)"
            if [ "\$attempt" -lt "\$max_attempts" ]; then
              echo "⚠️  retry in 5s..."
              sleep 5
            fi
            attempt=\$((attempt + 1))
          done
          exit 1
        ' && TARIFFS_SEED_OK=1 || true

        if [ "\$TARIFFS_SEED_OK" -ne 1 ]; then
          echo "❌ Tariffs seed failed after retries; abort deploy"
          docker compose \$COMPOSE_ARGS ps
          docker compose \$COMPOSE_ARGS logs --tail=150 bloobcat || true
          exit 1
        fi

        echo "✅ Деплой завершен"
        EOF
