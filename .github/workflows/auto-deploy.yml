name: Auto Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: tvpn-backend-deploy-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
      run: |
        ssh $SERVER_USER@$SERVER_HOST << EOF
        set -e
        if [ -z "$PROJECT_PATH" ]; then
          echo "PROJECT_PATH is empty"
          exit 1
        fi
        cd "$PROJECT_PATH"
        echo "🚀 Выполняем деплой..."

        if [ -d .git ]; then
          # The VPS repo can have local hotfixes / untracked overrides.
          # If we don't stash them, `git pull --ff-only` can fail and block deploy.
          # We stash including untracked files to avoid merge overwrites (best-effort).
          ts="$(date +%F_%H%M%S)"
          git stash push -u -m "autodeploy-prepull $ts" || true
          git pull --ff-only
        else
          echo "⚠️  No .git directory in PROJECT_PATH; skipping git pull"
        fi

        if [ ! -f docker-compose.yml ]; then
          echo "docker-compose.yml not found in $PROJECT_PATH"
          exit 1
        fi

        # Prefer prod override when present (Caddy/TLS, etc.)
        if [ -f docker-compose.prod.yml ]; then
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
        else
          docker compose -f docker-compose.yml up -d --build
        fi

        echo "✅ Деплой завершен"
        EOF
