name: DB Growth Monitor

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      send_always:
        description: "Send report even without warning"
        required: false
        default: false
        type: boolean
      warn_mb:
        description: "Warning threshold (MB)"
        required: false
        default: "4096"
        type: string

jobs:
  db-growth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Run DB growth monitor on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          SEND_ALWAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.send_always || 'false' }}
          WARN_MB: ${{ github.event_name == 'workflow_dispatch' && inputs.warn_mb || '4096' }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
          set -e
          if [ -z "$PROJECT_PATH" ]; then
            echo "PROJECT_PATH is empty"
            exit 1
          fi
          cd "$PROJECT_PATH"

          if [ -f docker-compose.prod.yml ]; then
            COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"
          else
            COMPOSE_ARGS="-f docker-compose.yml"
          fi

          SEND_FLAG=""
          if [ "$SEND_ALWAYS" = "true" ]; then
            SEND_FLAG="--send-always"
          fi

          echo "Running DB growth monitor (warn_mb=$WARN_MB, send_always=$SEND_ALWAYS)"
          docker compose $COMPOSE_ARGS exec -T -w /app bloobcat \
            python -m scripts.db_growth_notify --warn-mb "$WARN_MB" --top-n 30 --top-lines 8 $SEND_FLAG
          EOF

