name: Ops Set ADMIN_TELEGRAM_ID

on:
  workflow_dispatch:
    inputs:
      admin_telegram_id:
        description: "Telegram chat/channel ID for admin notifications (example: -1003780448735)"
        required: true
        default: "-1003780448735"
        type: string

jobs:
  set-admin-telegram-id:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Update .env and restart backend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          ADMIN_TELEGRAM_ID_NEW: ${{ inputs.admin_telegram_id }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
          set -e
          if [ -z "$PROJECT_PATH" ]; then
            echo "PROJECT_PATH is empty"
            exit 1
          fi
          if [ -z "$ADMIN_TELEGRAM_ID_NEW" ]; then
            echo "admin_telegram_id input is empty"
            exit 1
          fi

          cd "$PROJECT_PATH"
          test -f .env

          if grep -q '^ADMIN_TELEGRAM_ID=' .env; then
            sed -i "s/^ADMIN_TELEGRAM_ID=.*/ADMIN_TELEGRAM_ID=$ADMIN_TELEGRAM_ID_NEW/" .env
          else
            printf "\nADMIN_TELEGRAM_ID=%s\n" "$ADMIN_TELEGRAM_ID_NEW" >> .env
          fi

          echo "Updated ADMIN_TELEGRAM_ID in .env"
          grep '^ADMIN_TELEGRAM_ID=' .env || true

          if [ -f docker-compose.prod.yml ]; then
            COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"
          else
            COMPOSE_ARGS="-f docker-compose.yml"
          fi

          docker compose $COMPOSE_ARGS up -d --force-recreate bloobcat
          docker compose $COMPOSE_ARGS ps
          EOF
