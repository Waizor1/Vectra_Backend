name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write  # required for `build-and-push-image` to push to GHCR on main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Prepare test environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pip-audit
          pip install -e . --no-deps

      - name: Compile Python modules
        run: python -m compileall bloobcat

      - name: Run tests
        run: python -m pytest tests -q

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Setup Node for Directus extensions
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Validate Directus extensions
        run: |
          set -euo pipefail
          shopt -s nullglob
          for package in directus/extensions/*/package.json; do
            dir="$(dirname "$package")"
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(!p['directus:extension']?.path){throw new Error(process.argv[1]+' missing directus:extension.path')}" "$package"
            test -f "$dir/dist/index.js"
            if [ -f "$dir/package-lock.json" ]; then
              # The Directus SDK is a build-time devDependency; runtime extensions
              # ship compiled dist bundles. Audit runtime dependencies and still
              # build from source to catch extension drift.
              (cd "$dir" && npm ci && npm audit --audit-level high --omit=dev && npm run build --if-present)
            fi
          done

      - name: Validate compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  # Build the bloobcat image once in CI and push to GHCR so the deploy job can
  # `docker pull` instead of rebuilding on the prod server (which currently costs
  # 60-180s of the deploy window). This job runs only on push to main; PR builds
  # would clutter the registry and pushing requires `packages: write`.
  #
  # The deploy workflow consumes these images only when `vars.USE_GHCR_PREBUILT_IMAGE`
  # is set to `'true'`. Until then this job's output is unused — flip the variable
  # in `Settings → Variables → Actions` once you have validated the image.
  build-and-push-image:
    needs: verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    # Non-blocking by design: a GHCR push failure (registry hiccup, rate limit, token
    # rotation) must not gate the deploy workflow. The deploy script falls back to
    # the local --build path automatically, so the worst case is a slower deploy,
    # never a stuck pipeline.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vectra-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
