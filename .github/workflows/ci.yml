name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Prepare test environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pip-audit
          pip install -e . --no-deps

      - name: Compile Python modules
        run: python -m compileall bloobcat

      - name: Run tests
        run: python -m pytest tests -q

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Setup Node for Directus extensions
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Validate Directus extensions
        run: |
          set -euo pipefail
          shopt -s nullglob
          for package in directus/extensions/*/package.json; do
            dir="$(dirname "$package")"
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(!p['directus:extension']?.path){throw new Error(process.argv[1]+' missing directus:extension.path')}" "$package"
            test -f "$dir/dist/index.js"
            if [ -f "$dir/package-lock.json" ]; then
              # The Directus SDK is a build-time devDependency; runtime extensions
              # ship compiled dist bundles. Audit runtime dependencies and still
              # build from source to catch extension drift.
              (cd "$dir" && npm ci && npm audit --audit-level high --omit=dev && npm run build --if-present)
            fi
          done

      - name: Validate compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
