services:
  bloobcat_db:
    image: postgres:16-alpine
    container_name: bloobcat_db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Moscow
      POSTGRES_INITDB_ARGS: "-c timezone='Europe/Moscow'"
    ports:
      - "59132:5432"
    volumes:
      - bloobcat-db-volume:/var/lib/postgresql/data
    networks:
      - bloobcat_network

  bloobcat:
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
    ports:
      - "33083:33083"
    container_name: bloobcat
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./logs:/app/logs
    networks:
      - bloobcat_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: bloobcat_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: Europe/Moscow
    networks:
      - bloobcat_network
    depends_on:
      - bloobcat_db

  directus:
    image: directus/directus:10.10.5
    container_name: bloobcat_directus
    restart: always
    depends_on:
      - bloobcat_db
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: bloobcat_db
      DB_PORT: 5432
      DB_DATABASE: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      EXTENSIONS_PATH: /directus/extensions
      ADMIN_INTEGRATION_URL: ${ADMIN_INTEGRATION_URL}
      ADMIN_INTEGRATION_TOKEN: ${ADMIN_INTEGRATION_TOKEN}
      PROMO_HMAC_SECRET: ${PROMO_HMAC_SECRET}
    ports:
      - "8055:8055"
    volumes:
      - ./directus/extensions:/directus/extensions
      - directus-uploads:/directus/uploads
    networks:
      - bloobcat_network

networks:
  bloobcat_network:
    driver: bridge

volumes:
  bloobcat-db-volume:
  directus-uploads:
