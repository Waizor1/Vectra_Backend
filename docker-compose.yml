services:
  bloobcat_db:
    image: postgres:16-alpine
    container_name: bloobcat_db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Moscow
      POSTGRES_INITDB_ARGS: "-c timezone='Europe/Moscow'"
    ports:
      - "59132:5432"
    volumes:
      - bloobcat-db-volume:/var/lib/postgresql/data
    networks:
      - bloobcat_network

  bloobcat:
    env_file:
      - .env
    environment:
      - SCRIPT_DB=postgres://postgres:postgres@bloobcat_db:5432/postgres
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
    ports:
      - "33083:33083"
    container_name: bloobcat
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./logs:/app/logs
    networks:
      - bloobcat_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: bloobcat_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - bloobcat_network
    depends_on:
      - bloobcat_db

networks:
  bloobcat_network:
    driver: bridge

volumes:
  bloobcat-db-volume:
