services:
  bloobcat_db:
    image: postgres:16-alpine
    container_name: bloobcat_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Europe/Moscow
      POSTGRES_INITDB_ARGS: "-c timezone='Europe/Moscow'"
    ports:
      - "127.0.0.1:59132:5432"
    volumes:
      - bloobcat-db-volume:/var/lib/postgresql/data
    networks:
      - bloobcat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  bloobcat:
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
      - SCRIPT_DB=postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@bloobcat_db:5432/postgres
    ports:
      - "127.0.0.1:33083:33083"
    container_name: bloobcat
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TIME: ${BUILD_TIME:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - bloobcat_network
    depends_on:
      bloobcat_db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: bloobcat_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: Europe/Moscow
    networks:
      - bloobcat_network
    depends_on:
      bloobcat_db:
        condition: service_healthy

  directus:
    image: directus/directus:11.17.3
    container_name: bloobcat_directus
    restart: always
    depends_on:
      bloobcat_db:
        condition: service_healthy
    environment:
      # Reduce first-run friction / compliance modal in UI
      ACCEPT_TERMS: "true"
      PROJECT_OWNER: ${DIRECTUS_ADMIN_EMAIL}
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: bloobcat_db
      DB_PORT: 5432
      DB_DATABASE: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      EXTENSIONS_PATH: /directus/extensions
      # Open the custom Home module by default (keeps the UX consistent with RemnaWave/FastAdmin)
      ROOT_REDIRECT: "./admin/tvpn-home"
      ADMIN_INTEGRATION_URL: ${ADMIN_INTEGRATION_URL}
      ADMIN_INTEGRATION_TOKEN: ${ADMIN_INTEGRATION_TOKEN}
      PROMO_HMAC_SECRET: ${PROMO_HMAC_SECRET}
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - ./directus/extensions:/directus/extensions
      - directus-uploads:/directus/uploads
    networks:
      - bloobcat_network

networks:
  bloobcat_network:
    driver: bridge

volumes:
  bloobcat-db-volume:
  directus-uploads:
